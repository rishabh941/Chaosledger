# docker-compose.chaos.yml
version: '3.8'

services:

  # ── Toxiproxy ──────────────────────────────────────────────────
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    ports:
      - "8474:8474"
      - "18080:18080"
      - "18081:18081"
      - "18082:18082"
    networks: [ledger-net]
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── Initialize proxies after Toxiproxy is healthy ──────────────
  init-proxies:
    image: curlimages/curl:8.6.0
    depends_on:
      toxiproxy:
        condition: service_healthy
    networks: [ledger-net]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating Toxiproxy proxies..."
        curl -s -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"raft-node1","listen":"0.0.0.0:19864","upstream":"ledger-1:9864","enabled":true}' || true
        curl -s -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"raft-node2","listen":"0.0.0.0:19865","upstream":"ledger-2:9865","enabled":true}' || true
        curl -s -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"raft-node3","listen":"0.0.0.0:19866","upstream":"ledger-3:9866","enabled":true}' || true
        curl -s -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"http-node1","listen":"0.0.0.0:18080","upstream":"ledger-1:8080","enabled":true}' || true
        curl -s -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"http-node2","listen":"0.0.0.0:18081","upstream":"ledger-2:8081","enabled":true}' || true
        curl -s -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"http-node3","listen":"0.0.0.0:18082","upstream":"ledger-3:8082","enabled":true}' || true
        echo "All 6 proxies created."
        curl -s http://toxiproxy:8474/proxies | head -c 500
        echo ""

  # ── PostgreSQL Instances ───────────────────────────────────────
  postgres-1:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaosledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    volumes:
      - chaos-pgdata1:/var/lib/postgresql/data
    networks: [ledger-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-2:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaosledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    volumes:
      - chaos-pgdata2:/var/lib/postgresql/data
    networks: [ledger-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-3:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaosledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    volumes:
      - chaos-pgdata3:/var/lib/postgresql/data
    networks: [ledger-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ChaosLedger Nodes (Raft peers routed through Toxiproxy) ────
  ledger-1:
    image: chaosledger-ledger:test
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: node1
      JAVA_OPTS: "-Duser.timezone=UTC -Xmx384m -Xms256m"
      RAFT_PEERS: "node-1:toxiproxy:19864,node-2:toxiproxy:19865,node-3:toxiproxy:19866"
      CHAOS_ENABLED: "true"
      CHAOS_TOXIPROXY_URL: "http://toxiproxy:8474"
    tmpfs:
      - /data/raft
    depends_on:
      postgres-1:
        condition: service_healthy
      init-proxies:
        condition: service_completed_successfully
    networks: [ledger-net]

  ledger-2:
    image: chaosledger-ledger:test
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: node2
      JAVA_OPTS: "-Duser.timezone=UTC -Xmx384m -Xms256m"
      RAFT_PEERS: "node-1:toxiproxy:19864,node-2:toxiproxy:19865,node-3:toxiproxy:19866"
      CHAOS_ENABLED: "true"
      CHAOS_TOXIPROXY_URL: "http://toxiproxy:8474"
    tmpfs:
      - /data/raft
    depends_on:
      postgres-2:
        condition: service_healthy
      init-proxies:
        condition: service_completed_successfully
    networks: [ledger-net]

  ledger-3:
    image: chaosledger-ledger:test
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: node3
      JAVA_OPTS: "-Duser.timezone=UTC -Xmx384m -Xms256m"
      RAFT_PEERS: "node-1:toxiproxy:19864,node-2:toxiproxy:19865,node-3:toxiproxy:19866"
      CHAOS_ENABLED: "true"
      CHAOS_TOXIPROXY_URL: "http://toxiproxy:8474"
    tmpfs:
      - /data/raft
    depends_on:
      postgres-3:
        condition: service_healthy
      init-proxies:
        condition: service_completed_successfully
    networks: [ledger-net]

volumes:
  chaos-pgdata1:
  chaos-pgdata2:
  chaos-pgdata3:

networks:
  ledger-net:
    driver: bridge