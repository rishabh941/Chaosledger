services:
  # ── PostgreSQL Instances ──
  postgres-1:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaosledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    volumes:
      - pgdata1:/var/lib/postgresql/data
    networks: [ledger-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-2:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaosledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    volumes:
      - pgdata2:/var/lib/postgresql/data
    networks: [ledger-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-3:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaosledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    volumes:
      - pgdata3:/var/lib/postgresql/data
    networks: [ledger-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ChaosLedger Nodes ──
  ledger-1:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: node1
      JAVA_OPTS: "-Duser.timezone=UTC -Xmx384m -Xms256m"
    ports:
      - "8080:8080"
      - "9864:9864"
    volumes:
      - raftdata1:/data/raft
    depends_on:
      postgres-1:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [ledger-net]

  ledger-2:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: node2
      JAVA_OPTS: "-Duser.timezone=UTC -Xmx384m -Xms256m"
    ports:
      - "8081:8081"
      - "9865:9865"
    volumes:
      - raftdata2:/data/raft
    depends_on:
      postgres-2:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [ledger-net]

  ledger-3:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: node3
      JAVA_OPTS: "-Duser.timezone=UTC -Xmx384m -Xms256m"
    ports:
      - "8082:8082"
      - "9866:9866"
    volumes:
      - raftdata3:/data/raft
    depends_on:
      postgres-3:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [ledger-net]


  # Add this new service block (same level as postgres-1, ledger-1, etc.)
  kafka:
    image: apache/kafka:3.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks: [ledger-net]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s
  # ── Trust Dashboard ──────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - ledger-1
      - ledger-2
      - ledger-3
    networks: [ledger-net]

volumes:
  pgdata1:
  pgdata2:
  pgdata3:
  raftdata1:
  raftdata2:
  raftdata3:

networks:
  ledger-net:
    driver: bridge