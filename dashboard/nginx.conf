upstream api_backend {
    server ledger-1:8080 max_fails=1 fail_timeout=3s;
    server ledger-2:8081 backup;
    server ledger-3:8082 backup;
}

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # ── API requests → Spring Boot (with failover) ───────────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_connect_timeout 2s;
        proxy_next_upstream error timeout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── WebSocket → Spring Boot (with failover) ─────────────────
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 2s;
        proxy_next_upstream error timeout;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ── Chaos Agent (docker pause/unpause) ─────────────────────────
    location /chaos-agent/ {
        proxy_pass http://chaos-agent:8475/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    # Any path that doesn't match a file → serve index.html
    # (React Router handles client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
