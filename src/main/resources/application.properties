spring.application.name=ledger
# === Database ===
spring.datasource.url=jdbc:postgresql://localhost:5432/chaosledger?TimeZone=Asia/Kolkata
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA ===
# Important: never use ddl-auto=create or update in production-grade projects
# We use Flyway for migrations instead
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# === Flyway ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# === Server ===
server.port=8080

# === Actuator ===
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# === Logging ===
logging.level.com.chaosledger=DEBUG
logging.level.org.springframework.web=INFO

