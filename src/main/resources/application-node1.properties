# ── Raft Enabled ──
raft.enabled=true

# ── Node Identity ──
raft.node.id=node-1
raft.node.host=ledger-1
raft.node.port=9864
server.port=8080

# ── Cluster Peers (same on all nodes) ──
raft.peers=node-1:ledger-1:9864,node-2:ledger-2:9865,node-3:ledger-3:9866

# ── Raft Group ──
raft.group.id=chaosledger-group

# ── Raft Storage (Docker volume mount) ──
raft.storage.dir=/data/raft

# ── This node's PostgreSQL ──
spring.datasource.url=jdbc:postgresql://postgres-1:5432/chaosledger
spring.datasource.username=postgres
spring.datasource.password=postgres