# src/test/resources/docker-compose.chaos-test.yml
#
# Week 11 — Testcontainers version of the chaos compose file.
#
# Same topology as docker-compose.chaos.yml but with:
#   - No host port mappings (Testcontainers assigns random ports)
#   - Pre-built image tag (chaosledger-ledger:test)
#   - tmpfs for Raft storage (clean state per test)
#   - Ephemeral Postgres (no named volumes)
#
# Proxies are created by ChaosTestBase in Java, not by an init container,
# because Testcontainers needs the cluster healthy before tests run.
version: '3.8'

services:

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    networks: [ledger-net]
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres-1:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaosledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    networks: [ledger-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres-2:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaosledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    networks: [ledger-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres-3:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaosledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    networks: [ledger-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  ledger-1:
    image: chaosledger-ledger:test
    environment:
      SPRING_PROFILES_ACTIVE: node1
      JAVA_OPTS: "-Duser.timezone=UTC -Xmx384m -Xms256m"
      RAFT_PEERS: "node-1:toxiproxy:19864,node-2:toxiproxy:19865,node-3:toxiproxy:19866"
    tmpfs:
      - /data/raft
    depends_on:
      postgres-1:
        condition: service_healthy
      toxiproxy:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [ledger-net]

  ledger-2:
    image: chaosledger-ledger:test
    environment:
      SPRING_PROFILES_ACTIVE: node2
      JAVA_OPTS: "-Duser.timezone=UTC -Xmx384m -Xms256m"
      RAFT_PEERS: "node-1:toxiproxy:19864,node-2:toxiproxy:19865,node-3:toxiproxy:19866"
    tmpfs:
      - /data/raft
    depends_on:
      postgres-2:
        condition: service_healthy
      toxiproxy:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [ledger-net]

  ledger-3:
    image: chaosledger-ledger:test
    environment:
      SPRING_PROFILES_ACTIVE: node3
      JAVA_OPTS: "-Duser.timezone=UTC -Xmx384m -Xms256m"
      RAFT_PEERS: "node-1:toxiproxy:19864,node-2:toxiproxy:19865,node-3:toxiproxy:19866"
    tmpfs:
      - /data/raft
    depends_on:
      postgres-3:
        condition: service_healthy
      toxiproxy:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [ledger-net]


  kafka:
    image: apache/kafka:3.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks: [ ledger-net ]
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

networks:
  ledger-net:
    driver: bridge


